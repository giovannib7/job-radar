name: Job Radar

on:
  schedule:
    - cron: "0 6 * * *"      # 06:00 UTC ≈ 08:00 Geneva
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: job-radar
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependency
        run: pip install requests
      - name: Run Job Radar
        env:
          JOBRADAR_APP_PW: ${{ secrets.JOBRADAR_APP_PW }}
        run: python job_radar.py
      - name: Save the seen list
        run: |
          git config user.name "job-radar-bot"
          git config user.email "job-radar-bot@users.noreply.github.com"
          git add seen_jobs.csv
          git commit -m "update seen jobs [skip ci]" || echo "nothing to commit"
          git push || echo "nothing to push"
      - name: Assemble site
        run: |
          mkdir -p site
          cp jobs.html site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
